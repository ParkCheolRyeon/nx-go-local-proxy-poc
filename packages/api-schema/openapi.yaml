openapi: 3.0.3
info:
  title: iGallery DP API
  version: 0.1.0
  description: 사용자 웹앱(DP) 백엔드 API

servers:
  - url: https://api.dp.dev.local
    description: Local dev (proxy)
  - url: http://localhost:8080
    description: Direct local

paths:
  /health:
    get:
      operationId: getHealth
      summary: 헬스 췤
      tags:
        - system
      responses:
        '200':
          description: 정상 동작
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
