root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ."
  bin = "./tmp/server"
  delay = 500
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_regex = ["_test\\.go$"]
  kill_delay = "1s"
  send_interrupt = true
  stop_on_error = true
  log = "build-errors.log"

[color]
  build = "yellow"
  runner = "green"
  watcher = "cyan"
  app = ""

[log]
  time = false
  main_only = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
