version: '2'
sql:
  - engine: 'postgresql'
    queries: 'db/queries'
    schema: 'db/migrations'
    gen:
      go:
        package: 'db'
        out: 'internal/db'
        sql_package: 'pgx/v5'
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - column: 'users.created_at'
            go_type: 'time.Time'
