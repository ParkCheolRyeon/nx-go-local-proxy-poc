name: deploy
# git tag push 시 의도적 배포 트리거. 영역별 분리:
#   be/v*.*.*  → BE 만 빌드 (Docker → ECR)         → dp-back-pipeline 자동 트리거
#   fe/v*.*.*  → FE 만 빌드 (open-next → S3 source) → igallery-fe-server-pipeline / -image-pipeline 자동 트리거
#
# 둘 다 변경된 release 는 두 tag 를 같은 commit 에 push:
#   git tag be/v0.0.3 && git tag fe/v0.0.5 && git push --tags
#
# main push 자체는 ci.yml (검증) 만 동작. 배포 안 됨.

on:
  push:
    tags:
      - 'be/v*.*.*'
      - 'fe/v*.*.*'
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: 수동 트리거 시 대상
        options:
          - be
          - fe
        default: fe

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: '588344796279'
  ECR_REPO: dp-back
  FE_SOURCE_BUCKET: igallery-fe-source
  AWS_ROLE_ARN: arn:aws:iam::588344796279:role/gh-actions-deploy

jobs:
  be-build:
    name: BE build & ECR push
    if: startsWith(github.ref, 'refs/tags/be/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'be')
    # ARM native runner — image 가 linux/arm64 라 QEMU emulation 없이 직접 빌드.
    # x86 runner + QEMU 였을 땐 16분 → ARM native 는 ~3분.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-buildx-action@v3
      - name: Resolve tag / sha
        id: meta
        run: |
          set -euxo pipefail
          # be/v0.0.3 → semver=v0.0.3
          SEMVER="${GITHUB_REF_NAME#be/}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "semver=$SEMVER"          >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA"    >> "$GITHUB_OUTPUT"
      - name: Build & push arm64 image (세 태그)
        run: |
          set -euxo pipefail
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          docker buildx build \
            --platform linux/arm64 \
            -f apps/dp-back/Dockerfile apps/dp-back \
            -t "$REGISTRY/$ECR_REPO:${{ steps.meta.outputs.semver }}" \
            -t "$REGISTRY/$ECR_REPO:${{ steps.meta.outputs.short_sha }}" \
            -t "$REGISTRY/$ECR_REPO:latest" \
            --push
      - name: Summary
        run: |
          {
            echo "## BE image pushed"
            echo ""
            echo "- semver: \`${{ steps.meta.outputs.semver }}\`"
            echo "- sha: \`${{ steps.meta.outputs.short_sha }}\`"
            echo "- ECR: \`${{ env.ECR_REPO }}\`"
            echo ""
            echo "→ \`dp-back-pipeline\` 이 'latest' 변경을 감지하고 Build/Deploy 자동 진행."
            echo "→ CodeDeploy 콘솔 → dp-back/prod → 'Reroute traffic now' 클릭으로 swap."
          } >> $GITHUB_STEP_SUMMARY

  fe-build:
    name: FE build & S3 source upload
    if: startsWith(github.ref, 'refs/tags/fe/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'fe')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - name: open-next build
        run: pnpm --filter @igallery/dp-front exec open-next build
      - name: Force-include Next indirect deps (pnpm trace 누락 회피)
        run: |
          set -euxo pipefail
          DEST=apps/dp-front/.open-next/server-functions/default/node_modules
          mkdir -p "$DEST/@swc"
          cp -RL node_modules/styled-jsx "$DEST/"
          cp -RL node_modules/@swc/helpers "$DEST/@swc/"
          cp -RL node_modules/@next "$DEST/"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Resolve FE assets bucket
        id: fe
        run: |
          set -euxo pipefail
          BUCKET=$(aws cloudformation describe-stacks --stack-name IgalleryFe \
            --query 'Stacks[0].Outputs[?OutputKey==`AssetsBucketName`].OutputValue' --output text)
          echo "assets_bucket=$BUCKET" >> "$GITHUB_OUTPUT"
      - name: Resolve tag / sha
        id: meta
        run: |
          set -euxo pipefail
          # fe/v0.0.5 → semver=v0.0.5
          SEMVER="${GITHUB_REF_NAME#fe/}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "semver=$SEMVER"       >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
      - name: S3 sync (distribution bucket — 정적 자산은 swap 개념 없음)
        run: |
          set -euxo pipefail
          aws s3 sync apps/dp-front/.open-next/assets \
            "s3://${{ steps.fe.outputs.assets_bucket }}/_assets" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync apps/dp-front/.open-next/cache \
            "s3://${{ steps.fe.outputs.assets_bucket }}/_cache" \
            --cache-control "public,max-age=0,must-revalidate"
      - name: Package server zip
        run: |
          set -euxo pipefail
          cd apps/dp-front/.open-next/server-functions/default
          zip -qr "$GITHUB_WORKSPACE/server.zip" .
      - name: Package image zip
        run: |
          set -euxo pipefail
          cd apps/dp-front/.open-next/image-optimization-function
          zip -qr "$GITHUB_WORKSPACE/image.zip" .
      - name: Upload to S3 source bucket (Pipeline 이 latest.zip 변경 감지)
        run: |
          set -euxo pipefail
          # tag metadata = full ref name (예: fe/v0.0.4) — hook lambda 가 그대로 Slack 메시지에 표시.
          aws s3 cp server.zip "s3://${{ env.FE_SOURCE_BUCKET }}/fe/server/latest.zip" \
            --metadata "tag=${GITHUB_REF_NAME},sha=${{ steps.meta.outputs.short_sha }}"
          aws s3 cp image.zip "s3://${{ env.FE_SOURCE_BUCKET }}/fe/image/latest.zip" \
            --metadata "tag=${GITHUB_REF_NAME},sha=${{ steps.meta.outputs.short_sha }}"
      - name: Summary
        run: |
          {
            echo "## FE source uploaded"
            echo ""
            echo "- semver: \`${{ steps.meta.outputs.semver }}\`"
            echo "- sha: \`${{ steps.meta.outputs.short_sha }}\`"
            echo "- assets bucket sync: \`${{ steps.fe.outputs.assets_bucket }}\`"
            echo "- source bucket: \`${{ env.FE_SOURCE_BUCKET }}\`"
            echo ""
            echo "→ \`igallery-fe-server-pipeline\` / \`igallery-fe-image-pipeline\` 이 자동 트리거."
            echo "→ Build (publish-version) 끝나면 ⏸ Manual Approval 대기."
            echo "→ Pipeline 콘솔에서 'Approve' 클릭 후 CodeDeploy LINEAR 10%/1min 시프트 시작."
          } >> $GITHUB_STEP_SUMMARY
