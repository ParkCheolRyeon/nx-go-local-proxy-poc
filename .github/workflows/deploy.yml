name: deploy
# git tag v*.*.* push 시 의도적 배포 트리거.
# - BE: docker build → ECR push (세 태그: git tag / sha / latest)
#       → CodePipeline (dp-back-pipeline) 의 Source 가 ECR latest 갱신을 감지 → Build/Approval/Deploy
# - FE: open-next build → S3 sync (distribution bucket) + Lambda publish-version
#       → 옛 promote.yml 흐름 그대로 (Phase 2 에서 FE 도 Pipeline 으로 이전 예정)
#
# main push 자체는 ci.yml (검증) 만 동작. 배포 안 됨.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: '588344796279'
  ECR_REPO: dp-back
  AWS_ROLE_ARN: arn:aws:iam::588344796279:role/gh-actions-deploy

jobs:
  be-build:
    name: BE build & ECR push (CodePipeline 이 그 다음 처리)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Resolve tag / sha
        id: meta
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
      - name: Build & push arm64 image (세 태그)
        run: |
          set -euxo pipefail
          REGISTRY="${{ steps.ecr.outputs.registry }}"
          docker buildx build \
            --platform linux/arm64 \
            -f apps/dp-back/Dockerfile apps/dp-back \
            -t "$REGISTRY/$ECR_REPO:${{ steps.meta.outputs.tag }}" \
            -t "$REGISTRY/$ECR_REPO:${{ steps.meta.outputs.short_sha }}" \
            -t "$REGISTRY/$ECR_REPO:latest" \
            --push
      - name: Summary
        run: |
          {
            echo "## BE image pushed"
            echo ""
            echo "- tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- sha: \`${{ steps.meta.outputs.short_sha }}\`"
            echo "- ECR: \`${{ env.ECR_REPO }}\`"
            echo ""
            echo "→ CodePipeline \`dp-back-pipeline\` 이 'latest' 변경을 감지하고 Build/Approval 까지 자동 진행합니다."
            echo "→ Approval 단계는 AWS Console 의 CodePipeline 페이지에서 사람이 클릭."
          } >> $GITHUB_STEP_SUMMARY

  fe-build:
    name: FE build & Lambda publish-version (Phase 2 까지 옛 흐름)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm i --frozen-lockfile
      - name: open-next build
        run: pnpm --filter @igallery/dp-front exec open-next build
      - name: Force-include Next indirect deps (pnpm trace 누락 회피)
        run: |
          set -euxo pipefail
          DEST=apps/dp-front/.open-next/server-functions/default/node_modules
          mkdir -p "$DEST/@swc"
          cp -RL node_modules/styled-jsx "$DEST/"
          cp -RL node_modules/@swc/helpers "$DEST/@swc/"
          cp -RL node_modules/@next "$DEST/"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Resolve FE stack outputs
        id: fe
        run: |
          set -euxo pipefail
          OUT=$(aws cloudformation describe-stacks --stack-name IgalleryFe --query 'Stacks[0].Outputs')
          BUCKET=$(echo "$OUT" | jq -r '.[] | select(.OutputKey=="AssetsBucketName").OutputValue')
          SERVER_FN=$(echo "$OUT" | jq -r '.[] | select(.OutputKey=="ServerFunctionName").OutputValue')
          IMAGE_FN=$(echo "$OUT" | jq -r '.[] | select(.OutputKey=="ImageFunctionName").OutputValue')
          echo "bucket=$BUCKET"       >> "$GITHUB_OUTPUT"
          echo "server_fn=$SERVER_FN" >> "$GITHUB_OUTPUT"
          echo "image_fn=$IMAGE_FN"   >> "$GITHUB_OUTPUT"
      - name: S3 sync (distribution bucket — 정적 자산은 swap 개념 없음)
        run: |
          set -euxo pipefail
          aws s3 sync apps/dp-front/.open-next/assets \
            "s3://${{ steps.fe.outputs.bucket }}/_assets" \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync apps/dp-front/.open-next/cache \
            "s3://${{ steps.fe.outputs.bucket }}/_cache" \
            --cache-control "public,max-age=0,must-revalidate"
      - name: Package & publish server Lambda (alias 안 건드림)
        id: server
        run: |
          set -euxo pipefail
          cd apps/dp-front/.open-next/server-functions/default
          zip -r ../../../../../server.zip .
          cd -
          aws lambda update-function-code \
            --function-name "${{ steps.fe.outputs.server_fn }}" \
            --zip-file fileb://server.zip > /dev/null
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.fe.outputs.server_fn }}"
          NEW=$(aws lambda publish-version \
            --function-name "${{ steps.fe.outputs.server_fn }}" \
            --description "tag=${GITHUB_REF_NAME} sha=${GITHUB_SHA::7}" \
            --query Version --output text)
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
      - name: Package & publish image Lambda (alias 안 건드림)
        id: image
        run: |
          set -euxo pipefail
          cd apps/dp-front/.open-next/image-optimization-function
          zip -r ../../../../image.zip .
          cd -
          aws lambda update-function-code \
            --function-name "${{ steps.fe.outputs.image_fn }}" \
            --zip-file fileb://image.zip > /dev/null
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.fe.outputs.image_fn }}"
          NEW=$(aws lambda publish-version \
            --function-name "${{ steps.fe.outputs.image_fn }}" \
            --description "tag=${GITHUB_REF_NAME} sha=${GITHUB_SHA::7}" \
            --query Version --output text)
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
      - name: Summary
        run: |
          {
            echo "## FE published (Phase 2 까지 promote.yml 의 fe 트리거 사용)"
            echo ""
            echo "- server Lambda: v${{ steps.server.outputs.version }}"
            echo "- image Lambda:  v${{ steps.image.outputs.version }}"
          } >> $GITHUB_STEP_SUMMARY
